    <style>

        .lang-selector { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .flag { font-size: 24px; cursor: pointer; transition: transform 0.2s; user-select: none; opacity: 0.6; }
        .flag.active { opacity: 1; transform: scale(1.2); }
        .flag:hover { opacity: 1; }

        h1 { font-size: 22px; margin-top: 15px; margin-bottom: 5px; padding-right: 80px; text-align: left; color: #2c3e50; }
        @media (max-width: 480px) { h1 { padding-right: 0; text-align: center; margin-top: 35px; } }

        .subtitle { font-size: 13px; margin-bottom: 25px; text-align: left; color: #7f8c8d; }
        @media (max-width: 480px) { .subtitle { text-align: center; } }

        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #e0e0e0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #7f8c8d; transition: all 0.3s; }
        .tab.active { color: #2ecc71; border-bottom: 3px solid #2ecc71; }
        
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #34495e; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        
        /* Bouton de Refresh aléatoire */
        .refresh-btn { display: block; width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: background 0.2s; }
        .refresh-btn:hover { background: #2980b9; }

        .results { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #2ecc71; margin-bottom: 25px; }
        .results h3 { margin-top: 0; color: #2c3e50; font-size: 15px; }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { border-bottom: 1px solid #eee; }
        li:last-child { border-bottom: none; }
        
        .item-header { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .item-title-wrapper { display: flex; align-items: center; gap: 10px; }
        .item-title { font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .lock-icon { cursor: pointer; font-size: 16px; padding: 4px; transition: transform 0.1s; }
        .lock-icon:hover { transform: scale(1.2); }
        .arrow { font-size: 12px; color: #95a5a6; transition: transform 0.2s; }
        .open .arrow { transform: rotate(90deg); }
        
        .unit { font-weight: bold; color: #27ae60; background: #e8f8f0; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
        
        .item-details { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; background: #fff; padding: 0 15px; border-radius: 6px; }
        .open .item-details { max-height: 200px; padding: 12px 15px; margin-bottom: 10px; border: 1px dashed #e0e0e0; }
        
        .detail-row { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-bottom: 6px; }
        .detail-row:last-child { margin-bottom: 0; padding-top: 6px; border-top: 1px solid #eee; font-weight: bold; color: #2c3e50; }

        .comparison-section { margin-top: 25px; }
        .comparison-section h3 { font-size: 16px; color: #2c3e50; margin-bottom: 15px; }
        .store-card { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #e0e0e0; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; }
        .store-info { display: flex; flex-direction: column; }
        .store-name { font-weight: bold; font-size: 15px; }
        .store-badge { font-size: 11px; color: #7f8c8d; }
        .store-price-action { display: flex; align-items: center; gap: 15px; }
        .store-price { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .store-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; text-decoration: none; }
        .best-price { border: 2px solid #2ecc71; background: #f4fdf8; }
        .best-price .store-price { color: #27ae60; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <span class="flag active" id="flag-fr" onclick="changeLang('fr')">🇫🇷</span>
        <span class="flag" id="flag-en" onclick="changeLang('en')">🇬🇧</span>
        <span class="flag" id="flag-es" onclick="changeLang('es')">🇪🇸</span>
    </div>

    <h1 id="txt-title">🛒 Combien Pour Ma Party ?</h1>
    <div class="subtitle" id="txt-subtitle">Indices de prix mis à jour : Mai 2026</div>
    
    <div class="tabs">
        <div class="tab active" id="tab-bbq" onclick="switchTab('bbq')">🔥 Barbecue</div>
        <div class="tab" id="tab-apero" onclick="switchTab('apero')">🥂 Apéro Dînatoire</div>
    </div>

    <div class="input-group">
        <div class="input-field">
            <label id="lbl-adults" for="adults">Nombre d'adultes</label>
            <input type="number" id="adults" value="10" min="0" oninput="calculate()">
        </div>
        <div class="input-field">
            <label id="lbl-children" for="children">Nombre d'enfants</label>
            <input type="number" id="children" value="4" min="0" oninput="calculate()">
        </div>
    </div>

    <!-- BOUTON REFRESH -->
    <button class="refresh-btn" id="btn-refresh" onclick="refreshMenu()">🎲 Inspirer d'autres idées</button>

    <div class="results">
        <h3 id="txt-list-title">📋 Votre liste :</h3>
        <ul id="list-output">
            <!-- Injecté dynamiquement -->
        </ul>
    </div>

    <div class="comparison-section">
        <h3 id="txt-compare-title">🏆 Benchmark des enseignes pour votre panier :</h3>
        <div id="comparison-output">
            <!-- Injecté par JS -->
        </div>

</div>

<script>
    let currentMode = 'bbq';
    let currentLang = 'fr';

    // Structure d'état pour la gestion des tirages aléatoires et verrous
    const state = {
        selections: { bbq: {}, apero: {} },
        locked: {
            bbq: { viande: false, broch: false, salade: false, pain: false, rose: false, soft: false },
            apero: { piecesS: false, chips: false, biere: false, bulles: false, soft: false, piecesSu: false }

    };

    // Pool d'idées de rechange avec tarifs calculés (Mai 2026)
    const pools = {
        bbq: {
            viande: [
                { fr: { name: "🫔 Saucisses / Merguez", ex: "Merguez, Chipolatas" }, en: { name: "🫔 Sausages & Grill", ex: "Merguez, Chipolatas" }, es: { name: "🫔 Salchichas / Barbacoa", ex: "Merguez, Salchichas" }, price: 11.50, coef: 200, childCoef: 100, unit: "kg" },
                { fr: { name: "🥩 Côtes de Porc marinées", ex: "Échine de porc grillée" }, en: { name: "🥩 Marinated Pork Ribs", ex: "BBQ pork chops" }, es: { name: "🥩 Costillas de Cerdo", ex: "Costillas marinadas BBQ" }, price: 10.90, coef: 200, childCoef: 100, unit: "kg" },
                { fr: { name: "🍗 Pilons de Poulet Tex-Mex", ex: "Poulet épicé grillé" }, en: { name: "🍗 Tex-Mex Drumsticks", ex: "Spicy grilled chicken" }, es: { name: "🍗 Muslos de Pollo", ex: "Pollo picante a la parilla" }, price: 8.90, coef: 250, childCoef: 150, unit: "kg" }
            ],
            broch: [
                { fr: { name: "🍢 Brochettes de Bœuf", ex: "Bœuf, poivrons, oignons" }, en: { name: "🍢 Beef Skewers", ex: "Beef, peppers, onions" }, es: { name: "🍢 Brochetas de Ternera", ex: "Ternera con pimientos" }, price: 1.80, coef: 2, childCoef: 1, unit: "pcs" },
                { fr: { name: "🍢 Brochettes de Poulet Curry", ex: "Filet de poulet mariné" }, en: { name: "🍢 Curry Chicken Skewers", ex: "Marinated chicken breast" }, es: { name: "🍢 Brochetas de Pollo", ex: "Pollo marinado al curry" }, price: 1.40, coef: 2, childCoef: 1, unit: "pcs" },
                { fr: { name: "🍢 Brochettes de Canard", ex: "Canard et morceaux d'abricot" }, en: { name: "🍢 Duck Skewers", ex: "Duck chunks & apricot" }, es: { name: "🍢 Brochetas de Pato", ex: "Pato y trozos de albaricoque" }, price: 2.20, coef: 1.5, childCoef: 1, unit: "pcs" }
            ],
            salade: [
                { fr: { name: "🥗 Salades Traiteur class.", ex: "Taboulé, Piémontaise" }, en: { name: "🥗 Classic Deli Salads", ex: "Tabouli, Potato salad" }, es: { name: "🥗 Ensaladas Clásicas", ex: "Tabulé, Ensalada de patata" }, price: 6.50, coef: 200, childCoef: 100, unit: "kg" },
                { fr: { name: "🥗 Salade Pâtes & Féta", ex: "Pâtes, féta, tomates cerises" }, en: { name: "🥗 Feta & Pasta Salad", ex: "Pasta, feta, cherry tomatoes" }, es: { name: "🥗 Ensalada de Pasta", ex: "Pasta, feta, tomates cherris" }, price: 7.20, coef: 180, childCoef: 90, unit: "kg" }
            ],
            pain: [
                { fr: { name: "🥖 Baguettes de pain", ex: "Baguette classique ou Tradition" }, en: { name: "🥖 Baguette bread", ex: "Classic or Tradition baguette" }, es: { name: "🥖 Barras de pan (Baguette)", ex: "Baguette clásica o tradicional" }, price: 1.15, coef: 0.5, childCoef: 0.25, unit: "pcs" },
                { fr: { name: "🍔 Pains Burger / Buns", ex: "Pains briochés pour burgers" }, en: { name: "🍔 Burger Buns", ex: "Brioche style buns" }, es: { name: "🍔 Panes de Hamburguesa", ex: "Pan brioche para hamburguesas" }, price: 1.50, coef: 2, childCoef: 1, unit: "pcs" }
            ],
            rose: [
                { fr: { name: "🍷 Bouteilles Rosé / Rouge", ex: "Vin de pays / Entrée de gamme" }, en: { name: "🍷 Rosé / Red Wine", ex: "Local wine / Nice entry-level" }, es: { name: "🍷 Botellas Rosado / Tinto", ex: "Vino de la casa / Gama media" }, price: 5.50, coef: 0.334, childCoef: 0, unit: "bout." },
                { fr: { name: "🍻 Grand Pack de Bières", ex: "Pack de 24 bières blondes" }, en: { name: "🍻 Large Beer Pack", ex: "24-pack standard lagers" }, es: { name: "🍻 Pack Grande Cervezas", ex: "Pack de 24 cervezas rubias" }, price: 18.00, coef: 0.05, childCoef: 0, unit: "pack" }
            ],
            soft: [
                { fr: { name: "🥤 Softs Standards & Eau", ex: "Cola, Thé glacé, Eaux" }, en: { name: "🥤 Regular Sodas & Water", ex: "Cola, Iced tea, Water" }, es: { name: "🥤 Refrescos y Agua", ex: "Cola, Té frío, Agua" }, price: 1.60, coef: 0.5, childCoef: 0.5, unit: "L" }
            ]
        },
        apero: {
            piecesS: [
                { fr: { name: "🍕 Pièces salées classiques", ex: "Mini-quiches, feuilletés, nems" }, en: { name: "🍕 Classic Savory Snacks", ex: "Mini-quiches, puff pastries" }, es: { name: "🍕 Canapés salados clásicos", ex: "Mini-quiches, hojaldres" }, price: 0.45, coef: 12, childCoef: 6, unit: "pcs" },
                { fr: { name: "🍣 Plateau Sushis / Makis", ex: "Assortiment Saumon/Thon" }, en: { name: "🍣 Sushi & Maki Platter", ex: "Salmon & Tuna assortment" }, es: { name: "🍣 Bandeja de Sushi / Makis", ex: "Surtido Salmón y Atún" }, price: 0.95, coef: 8, childCoef: 4, unit: "pcs" }
            ],
            chips: [
                { fr: { name: "🥔 Chips & Biscuits salés", ex: "Chips salées, Bretzels" }, en: { name: "🥔 Crisps & Crackers", ex: "Salted crisps, Pretzels" }, es: { name: "🥔 Patatas fritas y Snacks", ex: "Patatas saladas, Bretzels" }, price: 14.00, coef: 30, childCoef: 20, unit: "g" },
                { fr: { name: "🥑 Tortillas & Guacamole", ex: "Triangles maïs et sauce avocat" }, en: { name: "🥑 Tortillas & Guacamole", ex: "Corn chips with avocado dip" }, es: { name: "🥑 Tortillas y Guacamole", ex: "Nachos de maíz con guacamole" }, price: 16.50, coef: 40, childCoef: 25, unit: "g" }
            ],
            biere: [
                { fr: { name: "🍺 Bières Blondes (33cl)", ex: "Canettes ou bouteilles (Lager)" }, en: { name: "🍺 Blonde Beers (33cl)", ex: "Cans or bottles (Lager)" }, es: { name: "🍺 Cervezas Rubias (33cl)", ex: "Latas o botellas (Lager)" }, price: 1.30, coef: 2, childCoef: 0, unit: "pcs" }
            ],
            bulles: [
                { fr: { name: "🍾 Vin blanc & Bulles", ex: "Prosecco, Crémant, Sauvignon" }, en: { name: "🍾 White Wine & Bubbles", ex: "Prosecco, Sparkling, Sauvignon" }, es: { name: "🍾 Vino blanco y Cavas", ex: "Prosecco, Cava, Sauvignon" }, price: 7.50, coef: 0.25, childCoef: 0, unit: "bout." }
            ],
            soft: [
                { fr: { name: "🥤 Softs & Jus de fruits", ex: "Jus d'orange, Sodas, Eaux" }, en: { name: "🥤 Softs & Fruit Juices", ex: "Orange juice, Sodas, Water" }, es: { name: "🥤 Refrescos y Zumos", ex: "Zumo de naranja, Refrescos" }, price: 1.60, coef: 0.5, childCoef: 0.5, unit: "L" }
            ],
            piecesSu: [
                { fr: { name: "🍰 Mignardises sucrées", ex: "Mini-éclairs, macarons" }, en: { name: "🍰 Sweet Mini-Pastries", ex: "Mini-eclairs, macarons" }, es: { name: "🍰 Dulces y Postres mignons", ex: "Mini-eclairs, macarons" }, price: 0.55, coef: 3, childCoef: 2, unit: "pcs" }
            ]
        }
    };

    const dict = {
        fr: {
            title: "🛒 Combien Pour Ma Party ?", subtitle: "Indices de prix mis à jour : Mai 2026",
            bbq: "🔥 Barbecue d'été", apero: "🥂 Apéro Dînatoire",
            adults: "Nombre d'adultes", children: "Nombre d'enfants",
            listTitle: "📋 Votre liste (Cadenas = Conserver l'ingrédient) :",
            compareTitle: "🏆 Benchmark des enseignes pour ce panier :",
            btnShop: "Commander ➔", refresh: "🎲 Inspirer d'autres idées",
            badgeCheapest: "Le moins cher (Hyper)", badgeStandard: "Prix Moyen (Supermarché)", badgePremium: "Prix Moyen (Supermarché)",
            ex: "Exemples :", avgPrice: "Prix Moyen constaté :", subtotal: "Sous-total :", type: "Type :", comp: "Composition :", format: "Format :",
            alertMsg: "🛒 Votre liste de courses a été copiée dans votre presse-papiers !\n\nNous ouvrons le site de "
        },
        en: {
            title: "🛒 How Much For My Party?", subtitle: "Price index updated: May 2026",
            bbq: "🔥 Summer BBQ", apero: "🥂 Cocktail Party",
            adults: "Number of adults", children: "Number of children",
            listTitle: "📋 Your list (Lock = Keep this item fixed):",
            compareTitle: "🏆 Store Benchmark for this cart:",
            btnShop: "Order ➔", refresh: "🎲 Refresh Menu Ideas",
            badgeCheapest: "Cheapest (Hypermarket)", badgeStandard: "Average Price (Supermarket)", badgePremium: "Average Price (Supermarket)",
            ex: "Examples:", avgPrice: "Average Price:", subtotal: "Subtotal:", type: "Type:", comp: "Composition:", format: "Format:",
            alertMsg: "🛒 Your grocery list has been copied to your clipboard!\n\nWe are opening the website of "
        },
        es: {
            title: "🛒 ¿Cuánto Para Mi Fiesta?", subtitle: "Índice de precios actualizado: Mayo 2026",
            bbq: "🔥 Barbacoa de verano", apero: "🥂 Cóctel / Aperitivo",
            adults: "Número de adultos", children: "Número de niños",
            listTitle: "📋 Tu lista (Candado = Bloquear ingrediente):",
            compareTitle: "🏆 Comparativa de tiendas para esta cesta:",
            btnShop: "Comprar ➔", refresh: "🎲 Inspirar otro menú",
            badgeCheapest: "El más barato (Hipermercado)", badgeStandard: "Precio Medio (Supermercado)", badgePremium: "Precio Medio (Supermercado)",
            ex: "Ejemplos:", avgPrice: "Precio Medio:", subtotal: "Subtotal:", type: "Tipo:", comp: "Composición:", format: "Formato:",
            alertMsg: "🛒 ¡Tu lista de la compra ha sido copiada al portapapeles!\n\nEstamos abriendo el sitio web de "
        }
    };

    // Initialisation des choix aléatoires
    function initSelections(mode) {
        Object.keys(pools[mode]).forEach(key => {
            if (state.selections[mode][key] === undefined) {
                state.selections[mode][key] = Math.floor(Math.random() * pools[mode][key].length);
            }
        });
    }

    // Fonction Refresh déclenchée par le bouton 🎲
    function refreshMenu() {
        const mode = currentMode;
        Object.keys(pools[mode]).forEach(key => {
            if (!state.locked[mode][key]) {
                const maxOptions = pools[mode][key].length;
                state.selections[mode][key] = Math.floor(Math.random() * maxOptions);
            }
        });
        calculate();
    }

    // Gestion du clic sur le verrou (Cadenas)
    function toggleLock(event, key) {
        event.stopPropagation(); // Évite d'ouvrir l'accordéon en cliquant sur le cadenas
        state.locked[currentMode][key] = !state.locked[currentMode][key];
        calculate();
    }

    function changeLang(lang) {
        currentLang = lang;
        ['fr', 'en', 'es'].forEach(l => document.getElementById(`flag-${l}`).classList.toggle('active', l === lang));
        
        document.getElementById('txt-title').innerText = dict[lang].title;
        document.getElementById('txt-subtitle').innerText = dict[lang].subtitle;
        document.getElementById('tab-bbq').innerText = dict[lang].bbq;
        document.getElementById('tab-apero').innerText = dict[lang].apero;
        document.getElementById('lbl-adults').innerText = dict[lang].adults;
        document.getElementById('lbl-children').innerText = dict[lang].children;
        document.getElementById('txt-list-title').innerText = dict[lang].listTitle;
        document.getElementById('txt-compare-title').innerText = dict[lang].compareTitle;
        document.getElementById('btn-refresh').innerText = dict[lang].refresh;
        
        calculate();
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-bbq').classList.toggle('active', mode === 'bbq');
        document.getElementById('tab-apero').classList.toggle('active', mode === 'apero');
        calculate();
    }

    function toggleItem(element) {
        element.parentElement.classList.toggle('open');
    }

    // NOUVELLE FONCTION : Extrait le texte affiché dans la liste et gère la copie/redirection
    function copierEtOuvrirDrive(nomMagasin, urlDrive) {
        const items = document.querySelectorAll('#list-output li');
        let texteAPasser = "";
        
        if (currentLang === 'fr') texteAPasser += "Ma liste de courses :\n";
        else if (currentLang === 'es') texteAPasser += "Mi lista de la compra:\n";
        else texteAPasser += "My grocery list:\n";

        items.forEach(li => {
            const titre = li.querySelector('.item-title').innerText.replace('▶', '').trim();
            const quantite = li.querySelector('.unit').innerText.trim();
            texteAPasser += `- ${titre} : ${quantite}\n`;
        });

        navigator.clipboard.writeText(texteAPasser).then(() => {
            alert(`${dict[currentLang].alertMsg}${nomMagasin}.`);
            window.open(urlDrive, '_blank');
        }).catch(err => {
            console.error("Erreur de copie : ", err);
            window.open(urlDrive, '_blank');
        });
    }

    function calculate() {
        const adults = parseInt(document.getElementById('adults').value) || 0;
        const children = parseInt(document.getElementById('children').value) || 0;
        const listOutput = document.getElementById('list-output');
        const compareOutput = document.getElementById('comparison-output');
        const t = dict[currentLang];
        
        initSelections(currentMode);
        
        let html = '';
        let baselineTotal = 0;
        const currentPool = pools[currentMode];

        Object.keys(currentPool).forEach(key => {
            const selectedIdx = state.selections[currentMode][key];
            const itemData = currentPool[key][selectedIdx];
            
            // Calcul mathématique de la quantité
            let qty = 0;
            if (itemData.unit === "kg" || itemData.unit === "g") {
                qty = (adults * itemData.coef) + (children * itemData.childCoef);
                // Correction : conversion en kg pour le calcul du prix
                qty = qty / 1000;
            } else {
                qty = Math.ceil((adults * itemData.coef) + (children * itemData.childCoef));
            }

            // Note: pour le calcul de prix, on utilise qty (en kg) ou le nb d'unités
            const itemCost = (itemData.unit === "kg" || itemData.unit === "g") ? (qty * itemData.price) : (qty * itemData.price);
            baselineTotal += itemCost;

            const isLocked = state.locked[currentMode][key];
            const lockEmoji = isLocked ? '🔒' : '🔓';

            // Traduction des spécificités techniques
            const langData = itemData[currentLang];

            // Pour l'affichage, on re-calcule une valeur lisible si c'est du poids
            const displayQty = (itemData.unit === "kg" || itemData.unit === "g") ? (qty * 1000) : qty;

            html += `
                <li>
                    <div class="item-header" onclick="toggleItem(this)">
                        <div class="item-title-wrapper">
                            <span class="lock-icon" onclick="toggleLock(event, '${key}')" title="Bloquer cet aliment">${lockEmoji}</span>
                            <span class="item-title"><span class="arrow">▶</span> ${langData.name}</span>
                        </div>
                        <span class="unit">${displayQty % 1 === 0 ? displayQty : displayQty.toFixed(2)} ${itemData.unit}</span>
                    </div>
                    <div class="item-details">
                        <div class="detail-row"><span>${t.ex}</span> <span>${langData.ex}</span></div>
                        <div class="detail-row"><span>${t.avgPrice}</span> <span>${itemData.price.toFixed(2)} € / ${itemData.unit === 'g' ? 'kg' : itemData.unit}</span></div>
                        <div class="detail-row"><span>${t.subtotal}</span> <span>${itemCost.toFixed(2)} €</span></div>
                    </div>
                </li>`;
        });

        listOutput.innerHTML = html;

        // Calcul des variances budgétaires du comparateur d'enseignes
        const priceLeclerc = baselineTotal * 0.94; 
        const priceCarrefour = baselineTotal * 1.00; 
        const priceIntermarche = baselineTotal * 0.98; 
        const priceAuchan = baselineTotal * 1.01; 

        let compareHtml = `
            <div class="store-card best-price">
                <div class="store-info">
                    <span class="store-name">E.Leclerc Drive</span>
                    <span class="store-badge">${t.badgeCheapest}</span>
                </div>
                <div class="store-price-action">
                    <span class="store-price">${priceLeclerc.toFixed(2)} €</span>
                    <button onclick="copierEtOuvrirDrive('E.Leclerc Drive', 'https://www.leclercdrive.fr')" class="store-btn">${t.btnShop}</button>
                </div>
            </div>
            <div class="store-card">
                <div class="store-info">
                    <span class="store-name">Carrefour Drive</span>
                    <span class="store-badge">${t.badgeStandard}</span>
                </div>
                <div class="store-price-action">
                    <span class="store-price">${priceCarrefour.toFixed(2)} €</span>
                    <button onclick="copierEtOuvrirDrive('Carrefour Drive', 'https://www.carrefour.fr/services/drive')" class="store-btn">${t.btnShop}</button>
                </div>
            </div>
            <div class="store-card">
                <div class="store-info">
                    <span class="store-name">Intermarché Drive</span>
                    <span class="store-badge">${t.badgePremium}</span>
                </div>
                <div class="store-price-action">
                    <span class="store-price">${priceIntermarche.toFixed(2)} €</span>
                    <button onclick="copierEtOuvrirDrive('Intermarché Drive', 'https://www.intermarche.com')" class="store-btn">${t.btnShop}</button>
                </div>
            </div>
            <div class="store-card">
                <div class="store-info">
                    <span class="store-name">Auchan Drive</span>
                    <span class="store-badge">${t.badgePremium}</span>
                </div>
                <div class="store-price-action">
                    <span class="store-price">${priceAuchan.toFixed(2)} €</span>
                    <button onclick="copierEtOuvrirDrive('Auchan Drive', 'https://www.auchan.fr/drive')" class="store-btn">${t.btnShop}</button>
                </div>
            </div>
        `;
        compareOutput.innerHTML = compareHtml;
    }

    // Chargement initial
    calculate();
</script>
