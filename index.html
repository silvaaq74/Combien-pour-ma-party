<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Quantités Festives</title>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        
        .lang-selector { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .flag { font-size: 24px; cursor: pointer; transition: transform 0.2s; user-select: none; opacity: 0.6; }
        .flag.active { opacity: 1; transform: scale(1.2); }
        
        h1 { font-size: 22px; margin-top: 15px; color: #2c3e50; }
        .subtitle { font-size: 13px; margin-bottom: 25px; color: #7f8c8d; }
        
        .input-group { display: flex; gap: 20px; margin-bottom: 15px; }
        .input-field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #34495e; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        .location-field { width: 100%; margin-bottom: 20px; }

        .refresh-btn { display: block; width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 25px; }
        
        .results { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #2ecc71; margin-bottom: 25px; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; width:90%; max-width:400px; padding:25px; border-radius:12px; max-height:80vh; overflow-y:auto; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
        .modal-item { padding:8px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; font-size: 14px; }
        .modal-total { margin-top:20px; text-align:right; font-weight:bold; font-size:1.2em; color: #27ae60; }
        
        .item-header { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .unit { font-weight: bold; color: #27ae60; background: #e8f8f0; padding: 4px 8px; border-radius: 4px; }
        
        .store-card { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #e0e0e0; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; }
        .store-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-selector">
        <span class="flag active" id="flag-fr" onclick="changeLang('fr')">🇫🇷</span>
    </div>

    <h1 id="txt-title">🛒 Combien Pour Ma Party ?</h1>
    <div class="subtitle">Indices de prix : Mai 2026</div>

    <div class="input-field location-field">
        <label>📍 Ville ou Code Postal</label>
        <input type="text" id="location" placeholder="Ex: Paris" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <div class="input-field">
            <label>Nombre d'adultes</label>
            <input type="number" id="adults" value="10" min="0" oninput="calculate()">
        </div>
        <div class="input-field">
            <label>Nombre d'enfants</label>
            <input type="number" id="children" value="4" min="0" oninput="calculate()">
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshMenu()">🎲 Inspirer d'autres idées</button>

    <div class="results">
        <h3>📋 Votre liste :</h3>
        <ul id="list-output"></ul>
    </div>

    <div id="comparison-output"></div>
</div>

<!-- Modal -->
<div id="receipt-modal" class="modal">
    <div class="modal-content">
        <h2 id="receipt-title" style="margin-top:0;">Récapitulatif</h2>
        <div id="receipt-content"></div>
        <div id="receipt-total" class="modal-total"></div>
        <button onclick="closeReceipt()" style="width:100%; padding:10px; margin-top:20px; background:#7f8c8d; color:white; border:none; border-radius:6px; cursor:pointer;">Fermer</button>
    </div>
</div>

<script>
    let currentMode = 'bbq';
    let state = { selections: { bbq: {}, apero: {} }, locked: { bbq: {}, apero: {} } };
    const pools = { bbq: { viande: [{name: "Saucisses", price: 11.50, coef: 200, unit: "kg"}, {name: "Côtes de Porc", price: 10.90, coef: 200, unit: "kg"}], pain: [{name: "Baguettes", price: 1.15, coef: 0.5, unit: "pcs"}]}, apero: { chips: [{name: "Chips", price: 14.00, coef: 30, unit: "g"}], biere: [{name: "Bières", price: 1.30, coef: 2, unit: "pcs"}]} };

    function initSelections() { 
        Object.keys(pools[currentMode]).forEach(key => { if (state.selections[currentMode][key] === undefined) state.selections[currentMode][key] = 0; }); 
    }

    function calculate() {
        const adults = parseInt(document.getElementById('adults').value) || 0;
        const children = parseInt(document.getElementById('children').value) || 0;
        const locationInput = document.getElementById('location').value.toLowerCase();
        const regionalMultiplier = (locationInput.includes("paris") || locationInput.includes("lyon")) ? 1.15 : 1.0;
        
        initSelections();
        let listOutput = document.getElementById('list-output');
        let html = '';
        let totalPanier = 0;

        Object.keys(pools[currentMode]).forEach(key => {
            const item = pools[currentMode][key][state.selections[currentMode][key]];
            const qty = (item.unit === "kg" || item.unit === "g") ? ((adults * item.coef) + (children * (item.coef/2))) / 1000 : Math.ceil((adults * item.coef) + (children * (item.coef/2)));
            const subtotal = qty * item.price;
            totalPanier += subtotal;
            html += `<li><div class="item-header">${item.name} <span class="unit">${qty} ${item.unit}</span></div></li>`;
        });
        listOutput.innerHTML = html;

        // Mise à jour des boutons du benchmark
        const compare = document.getElementById('comparison-output');
        const stores = ["E.Leclerc", "Carrefour", "Intermarché"];
        compare.innerHTML = stores.map(store => {
            const price = (totalPanier * (0.95 + Math.random() * 0.1)) * regionalMultiplier;
            return `<div class="store-card"><div><strong>${store}</strong><br><small>${price.toFixed(2)} €</small></div><button class="store-btn" onclick="showReceipt('${store}', ${price.toFixed(2)})">Commander</button></div>`;
        }).join('');
    }

    function showReceipt(store, price) {
        const items = document.querySelectorAll('.item-header');
        const content = document.getElementById('receipt-content');
        let html = '<ul>';
        items.forEach(el => {
            html += `<li class="modal-item"><span>${el.innerText.split(' ')[0]}</span> <span>${el.querySelector('.unit').innerText}</span></li>`;
        });
        html += '</ul>';
        content.innerHTML = html;
        document.getElementById('receipt-title').innerText = `Commande ${store}`;
        document.getElementById('receipt-total').innerText = `Total : ${price} €`;
        document.getElementById('receipt-modal').style.display = 'flex';
    }

    function closeReceipt() { document.getElementById('receipt-modal').style.display = 'none'; }
    function refreshMenu() { /* Logique de randomisation ici */ calculate(); }
    calculate();
</script>
</body>
</html>
