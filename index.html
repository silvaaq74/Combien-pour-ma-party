<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KBXLGNKX');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Quantités Festives</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .lang-selector { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .flag { font-size: 24px; cursor: pointer; transition: transform 0.2s; user-select: none; opacity: 0.6; }
        .flag.active { opacity: 1; transform: scale(1.2); }
        .flag:hover { opacity: 1; }
        h1 { font-size: 22px; margin-top: 15px; margin-bottom: 5px; padding-right: 80px; text-align: left; color: #2c3e50; }
        .subtitle { font-size: 13px; margin-bottom: 25px; text-align: left; color: #7f8c8d; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #e0e0e0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #7f8c8d; transition: all 0.3s; }
        .tab.active { color: #2ecc71; border-bottom: 3px solid #2ecc71; }
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-field { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #34495e; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; text-align: center; }
        .refresh-btn { display: block; width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 25px; transition: background 0.2s; }
        .refresh-btn:hover { background: #2980b9; }
        .results { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #2ecc71; margin-bottom: 25px; }
        ul { list-style: none; padding: 0; margin: 0; }
        .item-header { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .unit { font-weight: bold; color: #27ae60; background: #e8f8f0; padding: 4px 8px; border-radius: 4px; }
        .item-details { max-height: 0; overflow: hidden; transition: max-height 0.2s ease-out; padding: 0 15px; }
        .open .item-details { max-height: 200px; padding: 12px 15px; border: 1px dashed #e0e0e0; }
        .store-card { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #e0e0e0; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; }
        .store-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KBXLGNKX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

<div class="container">
    <div class="lang-selector">
        <span class="flag active" id="flag-fr" onclick="changeLang('fr')">🇫🇷</span>
        <span class="flag" id="flag-en" onclick="changeLang('en')">🇬🇧</span>
        <span class="flag" id="flag-es" onclick="changeLang('es')">🇪🇸</span>
    </div>
    <h1 id="txt-title">🛒 Combien Pour Ma Party ?</h1>
    <div class="subtitle" id="txt-subtitle">Indices de prix mis à jour : Mai 2026</div>
    <div class="tabs">
        <div class="tab active" id="tab-bbq" onclick="switchTab('bbq')">🔥 Barbecue</div>
        <div class="tab" id="tab-apero" onclick="switchTab('apero')">🥂 Apéro Dînatoire</div>
    </div>
    <div class="input-group">
        <div class="input-field"><label id="lbl-adults">Nombre d'adultes</label><input type="number" id="adults" value="10" oninput="calculate()"></div>
        <div class="input-field"><label id="lbl-children">Nombre d'enfants</label><input type="number" id="children" value="4" oninput="calculate()"></div>
    </div>
    <button class="refresh-btn" id="btn-refresh" onclick="refreshMenu()">🎲 Inspirer d'autres idées</button>
    <div class="results"><ul id="list-output"></ul></div>
    <div class="comparison-section" id="comparison-output"></div>
</div>

<script>
    let currentMode = 'bbq'; let currentLang = 'fr';
    const state = { selections: { bbq: {}, apero: {} }, locked: { bbq: { viande: false, broch: false, salade: false, pain: false, rose: false, soft: false }, apero: { piecesS: false, chips: false, biere: false, bulles: false, soft: false, piecesSu: false } } };
    const pools = {
        bbq: { 
            viande: [{ fr: { name: "🫔 Saucisses / Merguez" }, price: 11.50, coef: 200, childCoef: 100, unit: "kg" }, { fr: { name: "🥩 Côtes de Porc" }, price: 10.90, coef: 200, childCoef: 100, unit: "kg" }],
            broch: [{ fr: { name: "🍢 Brochettes de Bœuf" }, price: 1.80, coef: 2, childCoef: 1, unit: "pcs" }],
            salade: [{ fr: { name: "🥗 Salades Traiteur" }, price: 6.50, coef: 200, childCoef: 100, unit: "kg" }],
            pain: [{ fr: { name: "🥖 Baguettes" }, price: 1.15, coef: 0.5, childCoef: 0.25, unit: "pcs" }],
            rose: [{ fr: { name: "🍷 Rosé / Rouge" }, price: 5.50, coef: 0.334, childCoef: 0, unit: "bout." }],
            soft: [{ fr: { name: "🥤 Softs" }, price: 1.60, coef: 0.5, childCoef: 0.5, unit: "L" }]
        },
        apero: {
            piecesS: [{ fr: { name: "🍕 Pièces salées" }, price: 0.45, coef: 12, childCoef: 6, unit: "pcs" }],
            chips: [{ fr: { name: "🥔 Chips" }, price: 14.00, coef: 30, childCoef: 20, unit: "g" }],
            biere: [{ fr: { name: "🍺 Bières" }, price: 1.30, coef: 2, childCoef: 0, unit: "pcs" }],
            bulles: [{ fr: { name: "🍾 Bulles" }, price: 7.50, coef: 0.25, childCoef: 0, unit: "bout." }],
            soft: [{ fr: { name: "🥤 Softs" }, price: 1.60, coef: 0.5, childCoef: 0.5, unit: "L" }],
            piecesSu: [{ fr: { name: "🍰 Mignardises" }, price: 0.55, coef: 3, childCoef: 2, unit: "pcs" }]
        }
    };
    function initSelections(mode) { Object.keys(pools[mode]).forEach(k => { if(state.selections[mode][k]===undefined) state.selections[mode][k]=0; }); }
    function calculate() {
        const adults = parseInt(document.getElementById('adults').value) || 0;
        const children = parseInt(document.getElementById('children').value) || 0;
        initSelections(currentMode);
        let html = '', total = 0;
        Object.keys(pools[currentMode]).forEach(k => {
            const item = pools[currentMode][k][state.selections[currentMode][k]];
            let qty = (adults * item.coef) + (children * item.childCoef);
            let displayQty = item.unit === "kg" || item.unit === "g" ? (qty/1000).toFixed(2) : Math.ceil(qty);
            total += (qty/1000) * item.price;
            html += `<li onclick="this.classList.toggle('open')"><div class="item-header"><span>${item.fr.name}</span><span class="unit">${displayQty} ${item.unit}</span></div><div class="item-details">Prix moyen : ${item.price}€ / ${item.unit}</div></li>`;
        });
        document.getElementById('list-output').innerHTML = html;
        document.getElementById('comparison-output').innerHTML = `<div class="store-card"><span>E.Leclerc</span><span>${(total * 0.94).toFixed(2)}€</span><button class="store-btn" onclick="copierEtOuvrirDrive('Leclerc', 'https://www.leclercdrive.fr')">Commander</button></div>`;
    }
    function switchTab(m) { currentMode = m; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.id === 'tab-'+m)); calculate(); }
    function refreshMenu() { Object.keys(pools[currentMode]).forEach(k => { if(!state.locked[currentMode][k]) state.selections[currentMode][k] = Math.floor(Math.random() * pools[currentMode][k].length); }); calculate(); }
    function copierEtOuvrirDrive(n, u) { alert("Ouverture du site : " + n); window.open(u, '_blank'); }
    calculate();
</script>
</body>
</html>
